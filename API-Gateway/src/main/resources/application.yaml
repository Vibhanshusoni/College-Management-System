server:
  port: 8080

spring:
  application:
    name: API-Gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<path>.*), /${path}

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users/(?<path>.*), /${path}

        - id: course-service
          uri: lb://courseservice
          predicates:
            - Path=/api/courses/**
          filters:
            - RewritePath=/api/courses/(?<path>.*), /${path}

        - id: student-service
          uri: lb://studentservice
          predicates:
            - Path=/api/students/**
          filters:
            - RewritePath=/api/students/(?<path>.*), /${path}

        - id: library-service
          uri: lb://libraryservice
          predicates:
            - Path=/api/library/**
          filters:
            - RewritePath=/api/library/(?<path>.*), /${path}

        - id: dashboard-service
          uri: lb://dashboardservice
          predicates:
            - Path=/api/dashboard/**
          filters:
            - RewritePath=/api/dashboard/(?<path>.*), /${path}
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://192.168.1.7:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
  webflux:
    base-path: /

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs

      - name: User Service
        url: /api/users/v3/api-docs

      - name: Course Service
        url: /api/courses/v3/api-docs

      - name: Student Service
        url: /api/students/v3/api-docs

      - name: Library Service
        url: /api/library/v3/api-docs

      - name: Dashboard Service
        url: /api/dashboard/v3/api-docs

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long!!}
  expiration: ${JWT_EXPIRATION:86400000}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 0.0.0.0